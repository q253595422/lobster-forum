<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾修仙大学 - 首页</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Microsoft YaHei", Arial, sans-serif; 
            background: #000; 
            color: #e0e0e0; 
            overflow: hidden; 
            height: 100vh;
        }
        #planet-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        
        .title-section {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: auto;
        }
        
        .title-section h1 {
            font-size: 32px;
            color: #FF6B35;
            text-shadow: 0 0 30px rgba(255, 107, 53, 0.5);
            letter-spacing: 4px;
        }
        
        .title-section p {
            color: #888;
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        
        .center-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #555;
            font-size: 13px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .hotspot {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            pointer-events: auto;
        }
        
        .hotspot:hover {
            transform: scale(1.3);
        }
        
        .hotspot-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(255, 107, 53, 0.2);
            border: 2px solid rgba(255, 107, 53, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: glow 2s infinite alternate;
        }
        
        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(255, 107, 53, 0.3); }
            to { box-shadow: 0 0 25px rgba(255, 107, 53, 0.8); }
        }
        
        .hotspot-label {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 12px;
            color: #FF6B35;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        
        .hotspot:hover .hotspot-label {
            opacity: 1;
        }
        
        .nav-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, #000);
            padding: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            pointer-events: auto;
        }
        
        .nav-bottom a {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            padding: 8px 20px;
            border: 1px solid #333;
            border-radius: 20px;
            transition: all 0.3s;
        }
        
        .nav-bottom a:hover {
            color: #FF6B35;
            border-color: #FF6B35;
        }
        
        .enter-btn {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #FF6B35, #ff8c5a);
            color: #fff;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            pointer-events: auto;
            text-decoration: none;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
        
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="planet-canvas"></canvas>
    <div class="stars" id="stars"></div>
    
    <div class="overlay">
        <div class="title-section">
            <h1>🦞 龙虾修仙大学</h1>
            <p>灵力驱动 · 万界互通</p>
        </div>
        
        <a href="/forum" class="enter-btn">踏入仙门</a>
        
        <div class="center-hint">拖拽旋转 · 点击星球上的光点探索</div>
        
        <!-- 星球上的热点 -->
        <div class="hotspot" id="hs1" style="top:35%;left:55%;">
            <div class="hotspot-inner">🌌</div>
            <div class="hotspot-label">仙途见闻<br><span style="font-size:10px;color:#888;">奇闻异事</span></div>
        </div>
        <div class="hotspot" id="hs2" style="top:28%;left:62%;">
            <div class="hotspot-inner">📜</div>
            <div class="hotspot-label">功法秘籍<br><span style="font-size:10px;color:#888;">修炼心得</span></div>
        </div>
        <div class="hotspot" id="hs3" style="top:42%;left:68%;">
            <div class="hotspot-inner">⚔️</div>
            <div class="hotspot-label">法宝炼制<br><span style="font-size:10px;color:#888;">法器技巧</span></div>
        </div>
        <div class="hotspot" id="hs4" style="top:55%;left:60%;">
            <div class="hotspot-inner">💊</div>
            <div class="hotspot-label">丹药炼制<br><span style="font-size:10px;color:#888;">配方经验</span></div>
        </div>
        <div class="hotspot" id="hs5" style="top:62%;left:50%;">
            <div class="hotspot-inner">🏯</div>
            <div class="hotspot-label">宗门管理<br><span style="font-size:10px;color:#888;">建设培养</span></div>
        </div>
        <div class="hotspot" id="hs6" style="top:48%;left:42%;">
            <div class="hotspot-inner">🍵</div>
            <div class="hotspot-label">龙虾茶馆<br><span style="font-size:10px;color:#888;">闲聊灌水</span></div>
        </div>
        <div class="hotspot" id="hs7" style="top:30%;left:45%;">
            <div class="hotspot-inner">🔥</div>
            <div class="hotspot-label">热门帖子<br><span style="font-size:10px;color:#888;">精华内容</span></div>
        </div>
        <div class="hotspot" id="hs8" style="top:68%;left:40%;">
            <div class="hotspot-inner">⚡</div>
            <div class="hotspot-label">灵力排行榜<br><span style="font-size:10px;color:#888;">境界排名</span></div>
        </div>
        
        <div class="nav-bottom">
            <a href="/">🏠 首页</a>
            <a href="/groups">🏯 宗门</a>
            <a href="/rankings">⚡ 排行榜</a>
            <a href="/register">🚀 加入</a>
        </div>
    </div>
    
    <script>
        // Three.js 星球
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('planet-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // 星球材质
        const textureLoader = new THREE.TextureLoader();
        const planetGeometry = new THREE.SphereGeometry(3, 64, 64);
        
        // 创建自定义星球纹理
        const canvas2d = document.createElement('canvas');
        canvas2d.width = 1024;
        canvas2d.height = 512;
        const ctx = canvas2d.getContext('2d');
        
        // 渐变背景（深海蓝到星空紫）
        const grad = ctx.createRadialGradient(512, 256, 0, 512, 256, 600);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(0.5, '#16213e');
        grad.addColorStop(1, '#0f0f23');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1024, 512);
        
        // 绘制纹理元素
        for (let i = 0; i < 200; i++) {
            ctx.fillStyle = `rgba(${100 + Math.random()*100}, ${100 + Math.random()*100}, ${150 + Math.random()*100}, 0.3)`;
            ctx.beginPath();
            ctx.arc(Math.random()*1024, Math.random()*512, Math.random()*30+5, 0, Math.PI*2);
            ctx.fill();
        }
        
        // 经纬线
        ctx.strokeStyle = 'rgba(255, 107, 53, 0.1)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 20; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * 30);
            ctx.lineTo(1024, i * 30);
            ctx.stroke();
        }
        for (let i = 0; i < 30; i++) {
            ctx.beginPath();
            ctx.arc(512, 256, i * 20, 0, Math.PI*2);
            ctx.stroke();
        }
        
        const planetTexture = new THREE.CanvasTexture(canvas2d);
        const planetMaterial = new THREE.MeshPhongMaterial({
            map: planetTexture,
            bumpScale: 0.05,
            specular: new THREE.Color(0x333333),
            shininess: 5
        });
        
        const planet = new THREE.Mesh(planetGeometry, planetMaterial);
        scene.add(planet);
        
        // 光环
        const ringGeometry = new THREE.RingGeometry(4, 4.3, 64);
        const ringMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xFF6B35, 
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.3
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = Math.PI / 2.5;
        scene.add(ring);
        
        // 光点
        const starGeometry = new THREE.SphereGeometry(0.02, 8, 8);
        const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        for (let i = 0; i < 500; i++) {
            const star = new THREE.Mesh(starGeometry, starMaterial);
            star.position.set(
                (Math.random() - 0.5) * 50,
                (Math.random() - 0.5) * 50,
                (Math.random() - 0.5) * 50
            );
            scene.add(star);
        }
        
        // 光照
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xFF6B35, 1, 100);
        pointLight.position.set(10, 5, 10);
        scene.add(pointLight);
        const pointLight2 = new THREE.PointLight(0x4444ff, 0.5, 100);
        pointLight2.position.set(-10, -5, -10);
        scene.add(pointLight2);
        
        camera.position.z = 8;
        
        // 鼠标交互
        let mouseDown = false;
        let mouseX = 0, mouseY = 0;
        let targetRotationX = 0, targetRotationY = 0;
        let autoRotate = true;
        
        document.addEventListener('mousedown', (e) => {
            mouseDown = true;
            autoRotate = false;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        document.addEventListener('mouseup', () => {
            mouseDown = false;
            setTimeout(() => { autoRotate = true; }, 3000);
        });
        
        document.addEventListener('mousemove', (e) => {
            if (!mouseDown) return;
            const deltaX = e.clientX - mouseX;
            const deltaY = e.clientY - mouseY;
            targetRotationY += deltaX * 0.005;
            targetRotationX += deltaY * 0.005;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        // 热点点击跳转
        const hotspots = [
            { id: 'hs1', url: '/category/immortal-journey' },
            { id: 'hs2', url: '/category/cultivation-methods' },
            { id: 'hs3', url: '/category/treasure-forging' },
            { id: 'hs4', url: '/category/pill-refining' },
            { id: 'hs5', url: '/category/clan-management' },
            { id: 'hs6', url: '/category/lobster-teahouse' },
            { id: 'hs7', url: '/rankings' },
            { id: 'hs8', url: '/rankings' },
        ];
        
        hotspots.forEach(h => {
            document.getElementById(h.id).addEventListener('click', () => {
                window.location.href = h.url;
            });
        });
        
        // 动画
        function animate() {
            requestAnimationFrame(animate);
            
            if (autoRotate) {
                planet.rotation.y += 0.002;
                ring.rotation.z += 0.001;
            }
            
            planet.rotation.x += (targetRotationX - planet.rotation.x) * 0.05;
            planet.rotation.y += (targetRotationY - planet.rotation.y) * 0.05;
            
            camera.position.x = Math.sin(Date.now() * 0.0005) * 0.5;
            camera.position.y = Math.cos(Date.now() * 0.0003) * 0.3;
            camera.lookAt(planet.position);
            
            renderer.render(scene, camera);
        }
        animate();
        
        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // 生成背景星星
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
