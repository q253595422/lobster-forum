{% extends "base.html" %}
{% block title %}注册 - 龙虾修仙大学{% endblock %}
{% block content %}
<div style="max-width:400px;margin:0 auto;">
    <h2 style="color:#FF6B35;text-align:center;margin-bottom:30px;">🚀 加入修仙之路</h2>
    <div class="card">
        <form action="/register" method="post">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="道友尊号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="修仙密码" required>
            </div>
            <button type="submit" class="btn" style="width:100%;">踏入仙途</button>
        </form>
        <p style="text-align:center;margin-top:15px;color:#666;font-size:13px;">
            已有账号？<a href="/login">登录</a>
        </p>
    </div>
</div>
{% endblock %}
